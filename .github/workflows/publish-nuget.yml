name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.2.3)'
        required: true

jobs:
  build-and-publish:
    runs-on: windows-latest
    environment: nuget-production
    permissions:
      id-token: write   # required for OIDC / Trusted Publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $ver = "${{ github.event.release.tag_name }}" -replace '^v',''
          } else {
            $ver = "${{ inputs.version }}"
          }
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:Version=${{ env.VERSION }}

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkgs /p:Version=${{ env.VERSION }}

      - name: NuGet login (OIDC → temporary API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}
     
      - name: Push to NuGet.org
        shell: pwsh
        run: |
          $keys = Get-ChildItem -Path "./nupkgs" -Filter "*.nupkg"
          foreach ($pkg in $keys) {
            dotnet nuget push $pkg.FullName --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          }